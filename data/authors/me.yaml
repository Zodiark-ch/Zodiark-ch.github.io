bio: |
  Hang Chen received his Ph.D. from the Faculty of Electronic and Information Engineering at Xi'an Jiaotong University in March 2026. In June 2026, he joined the College of Computing & Data Science (CCDS) at Nanyang Technological University (NTU) as a Postdoctoral Research Fellow, working with Prof. [Wenya Wang](https://personal.ntu.edu.sg/wangwy/). His research is rooted in causal representation and structural analysis in machine learning. Recently, his focus has shifted towards applying the mechanistic interpretability of Large Language Models (LLMs) to guide and control post-training processes, such as Supervised Fine-Tuning (SFT) and Reinforcement Learning (RL).

