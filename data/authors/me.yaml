bio: |
  Hang Chen is a Ph.D. student in the School of Computer Science and Technology at Xi'an Jiaotong University, 
  where he is expected to complete his studies in March 2026. His research primarily focuses on the 
  mechanistic interpretability and causality capability of Large Language Models (LLMs), and its applications in parameter updating. 
  He aims to develop methodologies that allow for the causal intervention or modification of model behaviors based on a 
  fundamental understanding of their internal mechanisms.

